---
# TLS certificate for TLS Passthrough — mounted directly into the podinfo pod
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: podinfo-passthrough-tls
  namespace: default
spec:
  secretName: podinfo-passthrough-tls-secret
  issuerRef:
    name: selfsigned
    kind: ClusterIssuer
    group: cert-manager.io
  dnsNames:
    - podinfo-passthrough.172.18.50.1.nip.io
